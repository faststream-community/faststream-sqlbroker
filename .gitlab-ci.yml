# GitLab CI for faststream-sqlbroker.
# Adapted from the upstream faststream GitHub Actions pr_tests workflow.
#
# Requires a Docker-executor runner (shared or self-hosted) so that
# `services:` and the Docker images below work.

workflow:
  rules:
    # MR pipeline
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Branch pipeline, but skip if an MR pipeline already exists for the branch
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - integration
  - coverage

default:
  image: python:3.13-slim-bookworm
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache/

variables:
  UV_CACHE_DIR: $CI_PROJECT_DIR/.uv-cache
  UV_LINK_MODE: copy
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"
  # Lets the job and `services:` share a network so service aliases resolve.
  FF_NETWORK_PER_BUILD: "true"

.install-uv: &install-uv
  - apt-get update -qq
  - apt-get install -y --no-install-recommends ca-certificates curl
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - export PATH="$HOME/.local/bin:$PATH"

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------

lint:
  stage: lint
  before_script:
    - *install-uv
  script:
    - uv sync --group lint
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run mypy faststream_sqlbroker

# ---------------------------------------------------------------------------
# Unit tests (the `not connected` slice from upstream test-basic).
# Mirrors `pytest -m "(slow and not connected) or not connected"`.
# ---------------------------------------------------------------------------

.unit-test:
  stage: test
  before_script:
    - *install-uv
  script:
    - uv sync --group test
    - uv run pytest --cov --cov-report= -vv -m "(slow and not connected) or not connected"
    - mv .coverage .coverage.${PY_TAG}
  artifacts:
    when: always
    paths:
      - .coverage.*
    expire_in: 1 day

test:py3.10:
  extends: .unit-test
  image: python:3.10-slim-bookworm
  variables: { PY_TAG: "linux-py3.10" }

test:py3.11:
  extends: .unit-test
  image: python:3.11-slim-bookworm
  variables: { PY_TAG: "linux-py3.11" }

test:py3.12:
  extends: .unit-test
  image: python:3.12-slim-bookworm
  variables: { PY_TAG: "linux-py3.12" }

test:py3.13:
  extends: .unit-test
  image: python:3.13-slim-bookworm
  variables: { PY_TAG: "linux-py3.13" }

# ---------------------------------------------------------------------------
# Integration tests against Postgres + MySQL (upstream test-sqla-real).
# `tests/conftest.py` hardcodes `localhost:5432` / `localhost:3306`, so we
# bridge those ports to the GitLab service aliases with socat — this avoids
# editing the test code to read host from env.
# ---------------------------------------------------------------------------

test:sqla-real:
  stage: integration
  needs:
    - test:py3.13
  image: python:3.13-slim-bookworm
  services:
    - name: postgres:latest
      alias: postgres
      variables:
        POSTGRES_DB: broker
        POSTGRES_USER: broker
        POSTGRES_PASSWORD: brokerpass
    - name: mysql:latest
      alias: mysql
      variables:
        MYSQL_DATABASE: broker
        MYSQL_USER: broker
        MYSQL_PASSWORD: brokerpass
        MYSQL_ROOT_PASSWORD: brokerpass
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends ca-certificates curl default-mysql-client socat
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    # Bridge localhost:{5432,3306} -> service aliases so the tests' hardcoded
    # localhost connection strings just work.
    - socat tcp-listen:5432,fork,reuseaddr tcp:postgres:5432 &
    - socat tcp-listen:3306,fork,reuseaddr tcp:mysql:3306 &
    # Apply MySQL grants once the service is reachable.
    - until mysqladmin ping -h 127.0.0.1 -u root -pbrokerpass --silent; do sleep 1; done
    - mysql -h 127.0.0.1 -u root -pbrokerpass < tests/infra/init_mysql.sql
  script:
    - uv sync --group test
    - uv run pytest --cov --cov-report= -vv -m "(slow and sqla and connected) or (sqla and connected)"
    - mv .coverage .coverage.sqla-py
  artifacts:
    when: always
    paths:
      - .coverage.*
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Combine coverage from all of the above and publish HTML + Cobertura.
# ---------------------------------------------------------------------------

coverage:
  stage: coverage
  needs:
    - test:py3.10
    - test:py3.11
    - test:py3.12
    - test:py3.13
    - test:sqla-real
  before_script:
    - *install-uv
  script:
    - uv pip install --system "coverage[toml]"
    - coverage combine .coverage.*
    - coverage report
    - coverage xml -o coverage.xml
    - coverage html -d htmlcov --title "faststream-sqlbroker coverage for $CI_COMMIT_SHORT_SHA"
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
