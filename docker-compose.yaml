services:
  kafka:
    image: confluentinc/cp-kafka:8.0.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://127.0.0.1:9092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_BROKER_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    security_opt:
      - no-new-privileges:true

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: broker
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: brokerpass  # pragma: allowlist secret
    ports:
      - "5432:5432"
    security_opt:
      - no-new-privileges:true

  mysql:
    image: mysql:latest
    environment:
      MYSQL_DATABASE: broker
      MYSQL_USER: broker
      MYSQL_PASSWORD: brokerpass  # pragma: allowlist secret
      MYSQL_ROOT_PASSWORD: brokerpass  # pragma: allowlist secret
    ports:
      - "3306:3306"
    volumes:
      - ./tests/infra/init_mysql.sql:/docker-entrypoint-initdb.d/99-grant-all.sql:ro
    security_opt:
      - no-new-privileges:true
