site_name: FastStream SqlBroker
site_description: SqlBroker for FastStream — a relational database as a message broker
site_url: https://faststream-community.github.io/faststream-sqlbroker/

repo_name: faststream-community/faststream-sqlbroker
repo_url: https://github.com/faststream-community/faststream-sqlbroker
edit_uri: blob/main/docs/docs/

docs_dir: docs

watch:
  - docs
  - docs_src

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil-circle-outline
  features:
    - search.suggest
    - search.highlight
    - navigation.tabs            # navbar navigation
    - navigation.tabs.sticky     # navbar always expanded
    - navigation.instant         # XHR page swaps (no full reload → no flicker between tabs)
    - navigation.instant.progress # loading bar for slow page swaps
    - navigation.tracking        # show current TOC section in the page url
    - navigation.prune           # reduce render size
    - navigation.top             # back-to-top btn
    - navigation.footer          # show footer with next/prev btns
    - toc.integrate              # render the page TOC in the left sidebar
    - content.tabs.link          # sync total page tabs
    - content.code.copy
    - content.code.annotate      # code annotations with # (1)
    - content.action.edit        # add edit btn at every page

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - glightbox:                   # image zoom
      manual: true
  - mkdocstrings:                # generate the API reference
      default_handler: python
      handlers:
        python:
          import:
          - https://docs.python.org/3/objects.inv
          options:
            filters:
            - '!^_'
            show_root_heading: true
            show_if_no_docstring: true
            inherited_members: true
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            merge_init_into_class: true
            docstring_section_style: spacy
            signature_crossrefs: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_docstring_attributes: false
            show_signature_annotations: true
            load_external_modules: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
      css_files:
        - stylesheets/extra.css

hooks:
  - hooks/faststream_links.py

markdown_extensions:
  - toc:
      permalink: "#"             # replace TOC block symbol
      toc_depth: 3
  - mdx_include:
      base_path: .
      line_slice_separator: []
  - extra
  - admonition                   # !!! note blocks support
  - pymdownx.details             # admonition collapsible
  - pymdownx.superfences:        # highlight code syntax
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true      # allows link to codeline
  - pymdownx.inlinehilite        # inline code highlighting `#!python <code>`
  - pymdownx.tabbed:
      alternate_style: true      # create tabs group
  - attr_list                    # specify html attrs in markdown
  - md_in_html                   # render md wrapped to html tags
  - pymdownx.emoji:              # render material icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Tutorial: sqlbroker/tutorial.md
  - Design and Features: sqlbroker/design.md

# index.md is a redirect to the tutorial (the default landing page); keep it
# out of the nav without tripping the strict "not in nav" check.
not_in_nav: |
  index.md

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/faststream-community/faststream-sqlbroker
