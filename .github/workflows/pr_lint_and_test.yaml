name: Test

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: latest
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: uv sync --group lint
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy faststream_sqlbroker

  test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: broker
          POSTGRES_USER: broker
          POSTGRES_PASSWORD: brokerpass # pragma: allowlist secret
        ports:
          - 5432:5432
      mysql:
        image: mysql:latest
        env:
          MYSQL_DATABASE: broker
          MYSQL_USER: broker
          MYSQL_PASSWORD: brokerpass # pragma: allowlist secret
          MYSQL_ROOT_PASSWORD: brokerpass # pragma: allowlist secret
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - name: Grant MySQL privileges
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do sleep 1; done
          mysql -h 127.0.0.1 -u root -pbrokerpass < tests/infra/init_mysql.sql
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: latest
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group test
      - run: uv run pytest -n auto --cov --cov-report= -vv
      - name: Rename coverage file
        run: mkdir coverage && mv .coverage coverage/.coverage.py${{ matrix.python-version }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: .coverage.py${{ matrix.python-version }}
          path: coverage
          if-no-files-found: error
          include-hidden-files: true

  coverage:
    if: github.event.pull_request.draft == false
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: latest
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: .coverage*
          path: coverage
          merge-multiple: true
      - run: uv pip install --system "coverage[toml]"
      - run: coverage combine coverage
      - run: coverage report
      - run: coverage html -d htmlcov --title "faststream-sqlbroker coverage for ${{ github.sha }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov
